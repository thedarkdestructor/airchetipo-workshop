<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsCookin — Scansiona</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* Override page-content for full-bleed viewfinder */
    .scan-page .page-content {
      padding-top: 0;
    }

    /* --- Tab Toggle --- */
    .scan-tabs {
      display: flex;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-4);
      padding-top: calc(var(--topbar-height) + var(--space-2));
      background: var(--cream);
    }

    .scan-tab {
      flex: 1;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 600;
      text-align: center;
      color: var(--espresso-muted);
      background: var(--cream-dark);
      transition: all 0.2s;
      cursor: pointer;
    }

    .scan-tab.active {
      background: var(--espresso);
      color: var(--mozzarella);
    }

    /* --- Viewfinder --- */
    .viewfinder-wrap {
      padding: var(--space-3) var(--space-4);
    }

    .viewfinder {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: var(--radius-2xl);
      overflow: hidden;
      background: oklch(0.15 0.01 50);
    }

    .viewfinder-bg {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, transparent 40%, oklch(0.10 0.01 50 / 0.6) 100%),
        linear-gradient(180deg, oklch(0.22 0.02 50), oklch(0.18 0.02 50));
    }

    /* Corner guides */
    .viewfinder-guides {
      position: absolute;
      inset: var(--space-6);
      pointer-events: none;
    }

    .viewfinder-guides::before,
    .viewfinder-guides::after,
    .guide-bl::before,
    .guide-br::before {
      content: '';
      position: absolute;
      width: 2rem;
      height: 2rem;
      border-color: oklch(0.99 0 0 / 0.5);
      border-style: solid;
      border-width: 0;
    }

    .viewfinder-guides::before {
      top: 0; left: 0;
      border-top-width: 2.5px;
      border-left-width: 2.5px;
      border-top-left-radius: var(--radius-sm);
    }

    .viewfinder-guides::after {
      top: 0; right: 0;
      border-top-width: 2.5px;
      border-right-width: 2.5px;
      border-top-right-radius: var(--radius-sm);
    }

    .guide-bl::before {
      bottom: 0; left: 0;
      border-bottom-width: 2.5px;
      border-left-width: 2.5px;
      border-bottom-left-radius: var(--radius-sm);
    }

    .guide-br::before {
      bottom: 0; right: 0;
      border-bottom-width: 2.5px;
      border-right-width: 2.5px;
      border-bottom-right-radius: var(--radius-sm);
    }

    /* Center hint */
    .viewfinder-hint {
      text-align: center;
      color: oklch(0.99 0 0 / 0.7);
    }

    .viewfinder-hint-icon {
      font-size: 2.5rem;
      margin-bottom: var(--space-2);
      animation: pulse 2.5s ease-in-out infinite;
    }

    .viewfinder-hint-text {
      font-size: var(--text-sm);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* --- Shutter Controls --- */
    .shutter-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-8);
      padding: var(--space-5) var(--space-4);
    }

    .shutter-btn {
      width: 4.5rem;
      height: 4.5rem;
      border-radius: var(--radius-full);
      background: var(--tomato);
      border: 4px solid var(--mozzarella);
      box-shadow:
        0 0 0 3px var(--tomato),
        0 4px 20px oklch(0.55 0.22 25 / 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .shutter-btn:hover {
      transform: scale(1.06);
      box-shadow:
        0 0 0 3px var(--tomato-dark),
        0 6px 28px oklch(0.55 0.22 25 / 0.5);
    }

    .shutter-btn:active {
      transform: scale(0.95);
    }

    .shutter-side-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      color: var(--espresso-muted);
      font-size: var(--text-xs);
      font-weight: 500;
    }

    .shutter-side-btn .side-icon {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: var(--radius-full);
      background: var(--cream-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: background 0.15s;
    }

    .shutter-side-btn:hover .side-icon {
      background: var(--smoke);
    }

    /* --- Scanning overlay state --- */
    .scanning-overlay {
      position: absolute;
      inset: 0;
      background: oklch(0.10 0.01 50 / 0.75);
      backdrop-filter: blur(4px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      border-radius: var(--radius-2xl);
      z-index: 10;
    }

    .scanning-overlay.active {
      display: flex;
    }

    .scanning-dots {
      display: flex;
      gap: var(--space-2);
    }

    .scanning-dot {
      width: 10px;
      height: 10px;
      border-radius: var(--radius-full);
      background: var(--mozzarella);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .scanning-dot:nth-child(2) { animation-delay: 0.2s; }
    .scanning-dot:nth-child(3) { animation-delay: 0.4s; }

    .scanning-text {
      color: var(--mozzarella);
      font-size: var(--text-sm);
      font-weight: 500;
    }

    .scanning-subtext {
      color: oklch(0.99 0 0 / 0.6);
      font-size: var(--text-xs);
    }

    /* ============================================
       MANUAL MODE — US-003
       ============================================ */
    .manual-panel {
      display: none;
      padding: var(--space-4);
      padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 5rem);
    }

    .manual-panel.active {
      display: block;
    }

    /* --- Search Input --- */
    .search-input-wrap {
      position: relative;
      margin-bottom: var(--space-4);
    }

    .search-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      padding-left: 2.75rem;
      padding-right: 2.5rem;
      border-radius: var(--radius-full);
      border: 1.5px solid var(--smoke);
      background: var(--mozzarella);
      font-size: var(--text-base);
      color: var(--espresso);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--tomato-light);
      box-shadow: 0 0 0 3px oklch(0.55 0.22 25 / 0.1);
    }

    .search-input::placeholder {
      color: var(--ash);
    }

    .search-icon {
      position: absolute;
      left: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      color: var(--ash);
      pointer-events: none;
    }

    .search-clear {
      position: absolute;
      right: var(--space-3);
      top: 50%;
      transform: translateY(-50%);
      width: 1.5rem;
      height: 1.5rem;
      border-radius: var(--radius-full);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--ash);
      background: var(--cream-dark);
      transition: all 0.15s;
    }

    .search-clear.visible {
      display: flex;
    }

    .search-clear:hover {
      background: var(--smoke);
      color: var(--espresso);
    }

    /* --- Category Chips (horizontal scroll) --- */
    .category-chips-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin: 0 calc(-1 * var(--space-4));
      padding: 0 var(--space-4);
      margin-bottom: var(--space-4);
      mask-image: linear-gradient(to right, transparent, black 12px, black calc(100% - 12px), transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 12px, black calc(100% - 12px), transparent);
    }

    .category-chips-scroll::-webkit-scrollbar {
      display: none;
    }

    .category-chips {
      display: flex;
      gap: var(--space-2);
      flex-wrap: nowrap;
      padding-right: var(--space-2);
    }

    .category-chip {
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
      background: var(--cream-dark);
      color: var(--espresso-muted);
      border: 1.5px solid transparent;
      transition: all 0.15s;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .category-chip:hover,
    .category-chip.active {
      background: var(--tomato-bg);
      color: var(--tomato-dark);
      border-color: var(--tomato-light);
    }

    /* --- Autocomplete Dropdown --- */
    .autocomplete-wrap {
      position: relative;
      margin-bottom: var(--space-4);
    }

    .autocomplete {
      background: var(--mozzarella);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--smoke);
      overflow: hidden;
      max-height: 280px;
      overflow-y: auto;
      display: none;
    }

    .autocomplete.visible {
      display: block;
      animation: scaleIn 0.15s ease-out;
    }

    .autocomplete-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      transition: background 0.1s;
      cursor: pointer;
    }

    .autocomplete-item:hover {
      background: var(--cream);
    }

    .autocomplete-item + .autocomplete-item {
      border-top: 1px solid var(--cream-dark);
    }

    .autocomplete-emoji {
      font-size: 1.3rem;
      width: 1.75rem;
      text-align: center;
      flex-shrink: 0;
    }

    .autocomplete-name {
      flex: 1;
      font-weight: 500;
      min-width: 0;
    }

    .autocomplete-name strong {
      color: var(--tomato);
      font-weight: 700;
    }

    .autocomplete-category {
      font-size: var(--text-xs);
      color: var(--ash);
      flex-shrink: 0;
    }

    .autocomplete-add {
      width: 1.75rem;
      height: 1.75rem;
      border-radius: var(--radius-full);
      background: var(--tomato-bg);
      color: var(--tomato);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .autocomplete-item:hover .autocomplete-add {
      background: var(--tomato);
      color: white;
    }

    .autocomplete-empty {
      padding: var(--space-6) var(--space-4);
      text-align: center;
      color: var(--espresso-muted);
      font-size: var(--text-sm);
    }

    .autocomplete-empty-icon {
      font-size: 1.5rem;
      margin-bottom: var(--space-2);
      opacity: 0.5;
    }

    /* --- Selected Ingredients --- */
    .selected-section {
      margin-top: var(--space-2);
    }

    .selected-label {
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--espresso-muted);
      margin-bottom: var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .selected-count {
      background: var(--tomato-bg);
      color: var(--tomato-dark);
      padding: 1px 6px;
      border-radius: var(--radius-full);
      font-size: 0.65rem;
      font-weight: 700;
    }

    .selected-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    /* --- Ingredient Card --- */
    .ingredient-card {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3);
      background: var(--mozzarella);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      animation: fadeInUp 0.3s ease-out both;
    }

    .ingredient-card-emoji {
      font-size: 1.4rem;
      width: 2rem;
      text-align: center;
      flex-shrink: 0;
    }

    .ingredient-card-info {
      flex: 1;
      min-width: 0;
    }

    .ingredient-card-name {
      font-weight: 500;
      font-size: var(--text-sm);
      line-height: 1.2;
    }

    .ingredient-card-meta {
      font-size: var(--text-xs);
      color: var(--espresso-muted);
      margin-top: 1px;
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .ingredient-card-type {
      display: inline-flex;
      align-items: center;
      padding: 0 var(--space-2);
      border-radius: var(--radius-full);
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.6rem;
    }

    .type--fresco {
      background: var(--basil-bg);
      color: var(--basil-dark);
    }

    .type--surgelato {
      background: oklch(0.93 0.04 240);
      color: oklch(0.45 0.15 240);
    }

    .type--inscatola {
      background: var(--olive-bg);
      color: var(--olive-dark);
    }

    .ingredient-card-remove {
      width: 1.75rem;
      height: 1.75rem;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--ash);
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .ingredient-card-remove:hover {
      background: var(--tomato-bg);
      color: var(--tomato);
    }

    @keyframes slideOut {
      to {
        opacity: 0;
        transform: translateX(-100%);
        max-height: 0;
        padding: 0;
        margin: 0;
        overflow: hidden;
      }
    }

    .ingredient-card.removing {
      animation: slideOut 0.25s ease-in forwards;
    }

    /* --- Empty State --- */
    .empty-state {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--espresso-muted);
    }

    .empty-state-icon {
      font-size: 2.5rem;
      margin-bottom: var(--space-3);
      opacity: 0.35;
    }

    .empty-state-text {
      font-size: var(--text-sm);
      font-weight: 500;
    }

    .empty-state-sub {
      font-size: var(--text-xs);
      color: var(--ash);
      margin-top: var(--space-1);
    }

    /* --- Summary Bar --- */
    .manual-summary-bar {
      position: fixed;
      bottom: var(--nav-height);
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: var(--max-width);
      padding: var(--space-3) var(--space-4);
      padding-bottom: calc(var(--space-3) + var(--safe-bottom));
      background: linear-gradient(to top, var(--cream) 70%, oklch(0.97 0.01 85 / 0));
      z-index: 50;
      display: none;
      align-items: center;
      gap: var(--space-3);
    }

    .manual-summary-bar.visible {
      display: flex;
      animation: fadeInUp 0.25s ease-out;
    }

    .summary-text {
      flex: 1;
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--espresso-muted);
    }

    .summary-text strong {
      color: var(--espresso);
    }

    .manual-summary-bar .btn {
      box-shadow: var(--shadow-lg);
      flex-shrink: 0;
    }

    /* ============================================
       BOTTOM SHEET
       ============================================ */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: oklch(0.10 0.01 50 / 0.5);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .sheet-backdrop.active {
      opacity: 1;
      pointer-events: auto;
    }

    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: var(--max-width);
      background: var(--mozzarella);
      border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
      padding: var(--space-3) var(--space-4) var(--space-6);
      z-index: 201;
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 -8px 40px oklch(0.25 0.02 50 / 0.15);
    }

    .bottom-sheet.active {
      transform: translateX(-50%) translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      border-radius: var(--radius-full);
      background: var(--smoke);
      margin: 0 auto var(--space-4);
    }

    .sheet-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .sheet-header-emoji {
      font-size: 2rem;
      width: 3rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream-dark);
      border-radius: var(--radius-lg);
      flex-shrink: 0;
    }

    .sheet-header-name {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: var(--espresso);
      line-height: 1.2;
    }

    .sheet-header-category {
      font-size: var(--text-xs);
      color: var(--espresso-muted);
      margin-top: 2px;
    }

    .sheet-section {
      margin-bottom: var(--space-5);
    }

    .sheet-label {
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--espresso-muted);
      margin-bottom: var(--space-2);
    }

    /* Type pills */
    .type-pills {
      display: flex;
      gap: var(--space-2);
    }

    .type-pill {
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 500;
      background: var(--cream-dark);
      color: var(--espresso-muted);
      border: 1.5px solid transparent;
      transition: all 0.15s;
      cursor: pointer;
    }

    .type-pill.active {
      background: var(--tomato-bg);
      color: var(--tomato-dark);
      border-color: var(--tomato-light);
    }

    /* Quantity row */
    .quantity-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .quantity-stepper {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--smoke);
      border-radius: var(--radius-full);
      overflow: hidden;
      background: var(--mozzarella);
    }

    .stepper-btn {
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--espresso);
      background: var(--cream-dark);
      transition: background 0.15s;
    }

    .stepper-btn:hover {
      background: var(--smoke);
    }

    .stepper-btn:active {
      background: var(--ash);
      color: var(--mozzarella);
    }

    .stepper-value {
      width: 3rem;
      text-align: center;
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: var(--text-base);
      border: none;
      background: transparent;
      color: var(--espresso);
      outline: none;
      -moz-appearance: textfield;
    }

    .stepper-value::-webkit-inner-spin-button,
    .stepper-value::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .unit-pills {
      display: flex;
      gap: var(--space-1);
      flex-wrap: wrap;
    }

    .unit-pill {
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
      background: var(--cream-dark);
      color: var(--espresso-muted);
      border: 1.5px solid transparent;
      transition: all 0.15s;
      cursor: pointer;
    }

    .unit-pill.active {
      background: var(--basil-bg);
      color: var(--basil-dark);
      border-color: var(--basil-light);
    }

    .sheet-cta {
      margin-top: var(--space-2);
    }

    /* ============================================
       DESKTOP RESPONSIVE
       ============================================ */
    @media (min-width: 768px) {
      .scan-page .page-content {
        max-width: 600px;
        margin: 0 auto;
      }

      .viewfinder {
        aspect-ratio: 16/10;
      }

      .manual-panel {
        padding: var(--space-6);
        padding-bottom: var(--space-16);
      }

      .category-chips-scroll {
        mask-image: none;
        -webkit-mask-image: none;
        overflow-x: visible;
        margin: 0;
        padding: 0;
        margin-bottom: var(--space-4);
      }

      .category-chips {
        flex-wrap: wrap;
      }

      /* Sheet becomes centered modal on desktop */
      .bottom-sheet {
        bottom: auto;
        top: 50%;
        transform: translate(-50%, -50%) scale(0.9);
        opacity: 0;
        max-width: 420px;
        border-radius: var(--radius-2xl);
        transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.25s;
      }

      .bottom-sheet.active {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      .sheet-handle {
        display: none;
      }

      .manual-summary-bar {
        max-width: 600px;
        bottom: 0;
      }
    }

    @media (min-width: 1024px) {
      .scan-page .page-content {
        max-width: 900px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-6);
        align-items: start;
        padding: calc(var(--topbar-height) + var(--space-6)) var(--space-6) var(--space-6);
      }

      .scan-tabs {
        grid-column: 1 / -1;
        padding-top: 0;
        justify-content: center;
        max-width: 300px;
        margin: 0 auto;
      }

      #photo-panel, #manual-panel {
        grid-column: 1 / -1;
      }

      .selected-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-2);
      }

      .manual-summary-bar {
        max-width: 900px;
      }
    }
  </style>
</head>
<body>

<div class="phone-frame scan-page">

  <!-- Top Bar -->
  <header class="topbar">
    <a href="01-feed.html" class="topbar-logo">Whats<span>Cookin</span></a>
    <nav class="topbar-nav">
      <a href="01-feed.html" class="topbar-nav-link"><span class="link-icon">🏠</span> Feed</a>
      <a href="02-scan.html" class="topbar-nav-link active"><span class="link-icon">📷</span> Scan</a>
      <a href="05-profile.html" class="topbar-nav-link"><span class="link-icon">👤</span> Profilo</a>
    </nav>
    <div class="topbar-actions">
      <div class="topbar-avatar">M</div>
    </div>
  </header>

  <!-- Page Content -->
  <main class="page-content">

    <!-- Tab Toggle -->
    <div class="scan-tabs">
      <button class="scan-tab active" onclick="switchTab('photo')">📷 Foto</button>
      <button class="scan-tab" onclick="switchTab('manual')">✏️ Manuale</button>
    </div>

    <!-- PHOTO MODE -->
    <div id="photo-panel">
      <div class="viewfinder-wrap animate-in">
        <div class="viewfinder">
          <div class="viewfinder-bg">
            <div class="viewfinder-hint">
              <div class="viewfinder-hint-icon">🔍</div>
              <div class="viewfinder-hint-text">Inquadra i tuoi ingredienti</div>
            </div>
          </div>
          <div class="viewfinder-guides">
            <div class="guide-bl"></div>
            <div class="guide-br"></div>
          </div>
          <div class="scanning-overlay" id="scanningOverlay">
            <div class="scanning-dots">
              <div class="scanning-dot"></div>
              <div class="scanning-dot"></div>
              <div class="scanning-dot"></div>
            </div>
            <div class="scanning-text">Identifico gli ingredienti...</div>
            <div class="scanning-subtext">AI Vision in azione</div>
          </div>
        </div>
      </div>
      <div class="shutter-area animate-in animate-in-delay-1">
        <button class="shutter-side-btn">
          <span class="side-icon">🖼</span>
          <span>Galleria</span>
        </button>
        <button class="shutter-btn" aria-label="Scatta foto" onclick="simulateScan()"></button>
        <button class="shutter-side-btn">
          <span class="side-icon">⚡</span>
          <span>Flash</span>
        </button>
      </div>
    </div>

    <!-- MANUAL MODE -->
    <div id="manual-panel" class="manual-panel">

      <!-- Search -->
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Cerca ingredienti..." autocomplete="off">
        <button class="search-clear" id="searchClear" aria-label="Cancella ricerca">✕</button>
      </div>

      <!-- Category Chips -->
      <div class="category-chips-scroll">
        <div class="category-chips" id="categoryChips"></div>
      </div>

      <!-- Autocomplete -->
      <div class="autocomplete-wrap">
        <div class="autocomplete" id="autocomplete"></div>
      </div>

      <!-- Selected Ingredients -->
      <div class="selected-section" id="selectedSection">
        <div class="selected-label">
          Selezionati <span class="selected-count" id="selectedCount">0</span>
        </div>
        <div class="selected-list" id="selectedList"></div>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">🥘</div>
        <div class="empty-state-text">Cerca e aggiungi ingredienti</div>
        <div class="empty-state-sub">Usa la barra di ricerca o filtra per categoria</div>
      </div>
    </div>

  </main>

  <!-- Summary Bar -->
  <div class="manual-summary-bar" id="summaryBar">
    <span class="summary-text" id="summaryText"></span>
    <a href="03-confirm.html" class="btn btn-primary">Conferma →</a>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="01-feed.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Feed</span>
    </a>
    <a href="02-scan.html" class="nav-item nav-item--scan active">
      <span class="nav-icon">📷</span>
      <span class="nav-label">Scan</span>
    </a>
    <a href="05-profile.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profilo</span>
    </a>
  </nav>

</div>

<!-- Bottom Sheet -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-header-emoji" id="sheetEmoji"></div>
    <div>
      <div class="sheet-header-name" id="sheetName"></div>
      <div class="sheet-header-category" id="sheetCategory"></div>
    </div>
  </div>

  <div class="sheet-section">
    <div class="sheet-label">Tipo</div>
    <div class="type-pills" id="typePills"></div>
  </div>

  <div class="sheet-section">
    <div class="sheet-label">Quantità</div>
    <div class="quantity-row">
      <div class="quantity-stepper">
        <button class="stepper-btn" onclick="stepQuantity(-1)">−</button>
        <input type="number" class="stepper-value" id="stepperValue" value="1" min="1" max="999">
        <button class="stepper-btn" onclick="stepQuantity(1)">+</button>
      </div>
      <div class="unit-pills" id="unitPills"></div>
    </div>
  </div>

  <div class="sheet-cta">
    <button class="btn btn-primary btn-full" onclick="addIngredient()">Aggiungi</button>
  </div>
</div>

<script>
  // ============================================
  // DATA
  // ============================================
  var INGREDIENTS = [
    { id: 1,  name: "Pomodori San Marzano",  emoji: "\uD83C\uDF45", category: "verdure" },
    { id: 2,  name: "Pomodorini ciliegino",   emoji: "\uD83C\uDF45", category: "verdure" },
    { id: 3,  name: "Melanzane",              emoji: "\uD83C\uDF46", category: "verdure" },
    { id: 4,  name: "Zucchine",              emoji: "\uD83E\uDD52", category: "verdure" },
    { id: 5,  name: "Peperoni",              emoji: "\uD83E\uDED1", category: "verdure" },
    { id: 6,  name: "Basilico fresco",        emoji: "\uD83C\uDF3F", category: "verdure" },
    { id: 7,  name: "Cipolla rossa",          emoji: "\uD83E\uDDC5", category: "verdure" },
    { id: 8,  name: "Spinaci",               emoji: "\uD83E\uDD6C", category: "verdure" },
    { id: 9,  name: "Funghi porcini",         emoji: "\uD83C\uDF44", category: "verdure" },
    { id: 10, name: "Patate",                emoji: "\uD83E\uDD54", category: "verdure" },
    { id: 11, name: "Pancetta",              emoji: "\uD83E\uDD53", category: "carne" },
    { id: 12, name: "Prosciutto crudo",       emoji: "\uD83C\uDF56", category: "carne" },
    { id: 13, name: "Salsiccia",             emoji: "\uD83C\uDF2D", category: "carne" },
    { id: 14, name: "Pollo",                 emoji: "\uD83C\uDF57", category: "carne" },
    { id: 15, name: "Manzo macinato",         emoji: "\uD83E\uDD69", category: "carne" },
    { id: 16, name: "Guanciale",             emoji: "\uD83E\uDD53", category: "carne" },
    { id: 17, name: "Gamberi",               emoji: "\uD83E\uDD90", category: "pesce" },
    { id: 18, name: "Vongole",               emoji: "\uD83D\uDC1A", category: "pesce" },
    { id: 19, name: "Tonno fresco",           emoji: "\uD83D\uDC1F", category: "pesce" },
    { id: 20, name: "Salmone",               emoji: "\uD83C\uDF63", category: "pesce" },
    { id: 21, name: "Mozzarella di bufala",   emoji: "\uD83E\uDDC0", category: "latticini" },
    { id: 22, name: "Parmigiano Reggiano",    emoji: "\uD83E\uDDC0", category: "latticini" },
    { id: 23, name: "Ricotta",               emoji: "\uD83E\uDD5B", category: "latticini" },
    { id: 24, name: "Burro",                 emoji: "\uD83E\uDDC8", category: "latticini" },
    { id: 25, name: "Mascarpone",            emoji: "\uD83C\uDF66", category: "latticini" },
    { id: 26, name: "Chianti Classico",       emoji: "\uD83C\uDF77", category: "bevande" },
    { id: 27, name: "Prosecco",              emoji: "\uD83E\uDD42", category: "bevande" },
    { id: 28, name: "Birra artigianale",      emoji: "\uD83C\uDF7A", category: "bevande" },
    { id: 29, name: "Acqua frizzante",        emoji: "\uD83D\uDCA7", category: "bevande" },
    { id: 30, name: "Spaghetti",             emoji: "\uD83C\uDF5D", category: "dispensa" },
    { id: 31, name: "Penne rigate",           emoji: "\uD83C\uDF5D", category: "dispensa" },
    { id: 32, name: "Olio extravergine",      emoji: "\uD83E\uDED2", category: "dispensa" },
    { id: 33, name: "Aglio",                 emoji: "\uD83E\uDDC4", category: "dispensa" },
    { id: 34, name: "Concentrato di pomodoro",emoji: "\uD83E\uDED9", category: "dispensa" },
    { id: 35, name: "Farina 00",             emoji: "\uD83C\uDF3E", category: "dispensa" },
    { id: 36, name: "Pomodori pelati",        emoji: "\uD83E\uDD6B", category: "dispensa" },
    { id: 37, name: "Peperoncino",           emoji: "\uD83C\uDF36\uFE0F", category: "dispensa" }
  ];

  var CATEGORIES = [
    { id: "tutti",    label: "Tutti",    emoji: "\uD83C\uDF7D" },
    { id: "verdure",  label: "Verdure",  emoji: "\uD83E\uDD6C" },
    { id: "carne",    label: "Carne",    emoji: "\uD83E\uDD69" },
    { id: "pesce",    label: "Pesce",    emoji: "\uD83D\uDC1F" },
    { id: "latticini",label: "Latticini",emoji: "\uD83E\uDDC0" },
    { id: "bevande",  label: "Bevande",  emoji: "\uD83C\uDF77" },
    { id: "dispensa", label: "Dispensa", emoji: "\uD83E\uDED9" }
  ];

  var TYPES = ["Fresco", "Surgelato", "In scatola"];
  var UNITS = ["pz", "g", "kg", "ml", "L"];

  var CATEGORY_LABELS = {
    verdure: "Verdure", carne: "Carne", pesce: "Pesce",
    latticini: "Latticini", bevande: "Bevande", dispensa: "Dispensa"
  };

  // ============================================
  // STATE
  // ============================================
  var activeCategory = "tutti";
  var selectedIngredients = [];
  var pendingIngredient = null;
  var pendingType = "Fresco";
  var pendingUnit = "pz";
  var debounceTimer = null;

  // ============================================
  // HELPERS
  // ============================================
  function escapeHtml(str) {
    var d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function normalize(str) {
    return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  }

  function createEl(tag, className, textContent) {
    var el = document.createElement(tag);
    if (className) el.className = className;
    if (textContent) el.textContent = textContent;
    return el;
  }

  // ============================================
  // INIT
  // ============================================
  document.addEventListener("DOMContentLoaded", function() {
    renderCategoryChips();
    renderTypePills();
    renderUnitPills();
    renderSelected();

    var input = document.getElementById("searchInput");
    var clearBtn = document.getElementById("searchClear");

    input.addEventListener("input", function() {
      clearBtn.classList.toggle("visible", input.value.length > 0);
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() { handleSearch(input.value); }, 150);
    });

    input.addEventListener("focus", function() {
      if (input.value.length > 0) handleSearch(input.value);
    });

    clearBtn.addEventListener("click", function() {
      input.value = "";
      clearBtn.classList.remove("visible");
      hideAutocomplete();
      input.focus();
    });

    document.getElementById("sheetBackdrop").addEventListener("click", closeBottomSheet);

    document.addEventListener("click", function(e) {
      var wrap = document.querySelector(".autocomplete-wrap");
      var inputWrap = document.querySelector(".search-input-wrap");
      if (!wrap.contains(e.target) && !inputWrap.contains(e.target)) {
        hideAutocomplete();
      }
    });
  });

  // ============================================
  // SEARCH & FILTER
  // ============================================
  function filterIngredients(query, category) {
    var q = normalize(query.trim());
    if (!q) return [];

    var alreadyIds = {};
    selectedIngredients.forEach(function(s) { alreadyIds[s.id] = true; });

    var results = [];
    for (var i = 0; i < INGREDIENTS.length && results.length < 6; i++) {
      var ing = INGREDIENTS[i];
      if (alreadyIds[ing.id]) continue;
      if (category !== "tutti" && ing.category !== category) continue;
      if (normalize(ing.name).indexOf(q) !== -1) results.push(ing);
    }
    return results;
  }

  function handleSearch(query) {
    var results = filterIngredients(query, activeCategory);
    renderAutocomplete(results, query);
  }

  // ============================================
  // RENDER: Category Chips
  // ============================================
  function renderCategoryChips() {
    var container = document.getElementById("categoryChips");
    container.textContent = "";
    CATEGORIES.forEach(function(cat) {
      var btn = createEl("button", "category-chip" + (cat.id === activeCategory ? " active" : ""));
      btn.textContent = cat.emoji + " " + cat.label;
      btn.addEventListener("click", function() { setCategory(cat.id); });
      container.appendChild(btn);
    });
  }

  function setCategory(id) {
    activeCategory = id;
    renderCategoryChips();
    var query = document.getElementById("searchInput").value;
    if (query) handleSearch(query);
  }

  // ============================================
  // RENDER: Autocomplete
  // ============================================
  function highlightMatch(name, query) {
    var normalizedName = normalize(name);
    var idx = normalizedName.indexOf(query);
    if (idx === -1) return document.createTextNode(name);

    var frag = document.createDocumentFragment();
    if (idx > 0) frag.appendChild(document.createTextNode(name.slice(0, idx)));
    var strong = document.createElement("strong");
    strong.textContent = name.slice(idx, idx + query.length);
    frag.appendChild(strong);
    var rest = name.slice(idx + query.length);
    if (rest) frag.appendChild(document.createTextNode(rest));
    return frag;
  }

  function renderAutocomplete(results, query) {
    var el = document.getElementById("autocomplete");
    el.textContent = "";

    if (!query || query.trim().length === 0) {
      hideAutocomplete();
      return;
    }

    if (results.length === 0) {
      var emptyDiv = createEl("div", "autocomplete-empty");
      var icon = createEl("div", "autocomplete-empty-icon", "\uD83E\uDD37");
      var text = document.createTextNode('Nessun ingrediente trovato per "' + query + '"');
      emptyDiv.appendChild(icon);
      emptyDiv.appendChild(text);
      el.appendChild(emptyDiv);
      el.classList.add("visible");
      return;
    }

    var q = normalize(query.trim());
    results.forEach(function(ing) {
      var item = createEl("div", "autocomplete-item");
      item.addEventListener("click", function() { openBottomSheet(ing.id); });

      var emoji = createEl("span", "autocomplete-emoji", ing.emoji);
      var nameSpan = createEl("span", "autocomplete-name");
      nameSpan.appendChild(highlightMatch(ing.name, q));
      var cat = createEl("span", "autocomplete-category", CATEGORY_LABELS[ing.category]);
      var addBtn = createEl("span", "autocomplete-add", "+");

      item.appendChild(emoji);
      item.appendChild(nameSpan);
      item.appendChild(cat);
      item.appendChild(addBtn);
      el.appendChild(item);
    });

    el.classList.add("visible");
  }

  function hideAutocomplete() {
    document.getElementById("autocomplete").classList.remove("visible");
  }

  // ============================================
  // BOTTOM SHEET
  // ============================================
  function openBottomSheet(ingredientId) {
    pendingIngredient = null;
    for (var i = 0; i < INGREDIENTS.length; i++) {
      if (INGREDIENTS[i].id === ingredientId) { pendingIngredient = INGREDIENTS[i]; break; }
    }
    if (!pendingIngredient) return;

    pendingType = "Fresco";
    pendingUnit = "pz";

    document.getElementById("sheetEmoji").textContent = pendingIngredient.emoji;
    document.getElementById("sheetName").textContent = pendingIngredient.name;
    document.getElementById("sheetCategory").textContent = CATEGORY_LABELS[pendingIngredient.category];
    document.getElementById("stepperValue").value = 1;

    renderTypePills();
    renderUnitPills();

    document.getElementById("sheetBackdrop").classList.add("active");
    document.getElementById("bottomSheet").classList.add("active");
  }

  function closeBottomSheet() {
    document.getElementById("sheetBackdrop").classList.remove("active");
    document.getElementById("bottomSheet").classList.remove("active");
    pendingIngredient = null;
  }

  // ============================================
  // RENDER: Type & Unit Pills
  // ============================================
  function renderTypePills() {
    var container = document.getElementById("typePills");
    container.textContent = "";
    TYPES.forEach(function(t) {
      var btn = createEl("button", "type-pill" + (t === pendingType ? " active" : ""), t);
      btn.addEventListener("click", function() { setType(t); });
      container.appendChild(btn);
    });
  }

  function setType(type) {
    pendingType = type;
    renderTypePills();
  }

  function renderUnitPills() {
    var container = document.getElementById("unitPills");
    container.textContent = "";
    UNITS.forEach(function(u) {
      var btn = createEl("button", "unit-pill" + (u === pendingUnit ? " active" : ""), u);
      btn.addEventListener("click", function() { setUnit(u); });
      container.appendChild(btn);
    });
  }

  function setUnit(unit) {
    pendingUnit = unit;
    renderUnitPills();
  }

  // ============================================
  // QUANTITY STEPPER
  // ============================================
  function stepQuantity(delta) {
    var input = document.getElementById("stepperValue");
    var val = parseInt(input.value, 10) || 1;
    val = Math.max(1, Math.min(999, val + delta));
    input.value = val;
  }

  // ============================================
  // ADD / REMOVE INGREDIENTS
  // ============================================
  function addIngredient() {
    if (!pendingIngredient) return;

    var quantity = Math.max(1, parseInt(document.getElementById("stepperValue").value, 10) || 1);

    selectedIngredients.push({
      id: pendingIngredient.id,
      name: pendingIngredient.name,
      emoji: pendingIngredient.emoji,
      category: pendingIngredient.category,
      quantity: quantity,
      unit: pendingUnit,
      type: pendingType
    });

    closeBottomSheet();
    hideAutocomplete();

    var input = document.getElementById("searchInput");
    input.value = "";
    document.getElementById("searchClear").classList.remove("visible");

    renderSelected();
  }

  function removeIngredient(id) {
    var card = document.querySelector('.ingredient-card[data-id="' + id + '"]');
    if (card) {
      card.classList.add("removing");
      card.addEventListener("animationend", function() {
        selectedIngredients = selectedIngredients.filter(function(i) { return i.id !== id; });
        renderSelected();
      });
    }
  }

  // ============================================
  // RENDER: Selected List
  // ============================================
  function renderSelected() {
    var list = document.getElementById("selectedList");
    var countEl = document.getElementById("selectedCount");
    var empty = document.getElementById("emptyState");
    var section = document.getElementById("selectedSection");
    var bar = document.getElementById("summaryBar");
    var summaryText = document.getElementById("summaryText");

    countEl.textContent = selectedIngredients.length;

    if (selectedIngredients.length === 0) {
      section.style.display = "none";
      empty.style.display = "";
      bar.classList.remove("visible");
      return;
    }

    section.style.display = "";
    empty.style.display = "none";
    bar.classList.add("visible");

    var typeClassMap = { "Fresco": "type--fresco", "Surgelato": "type--surgelato", "In scatola": "type--inscatola" };

    list.textContent = "";
    selectedIngredients.forEach(function(ing, i) {
      var card = createEl("div", "ingredient-card");
      card.setAttribute("data-id", ing.id);
      card.style.animationDelay = (i * 0.05) + "s";

      var emoji = createEl("span", "ingredient-card-emoji", ing.emoji);

      var info = createEl("div", "ingredient-card-info");
      var name = createEl("div", "ingredient-card-name", ing.name);
      var meta = createEl("div", "ingredient-card-meta");
      meta.appendChild(document.createTextNode(ing.quantity + " " + ing.unit + " \u00B7 "));
      var typeBadge = createEl("span", "ingredient-card-type " + (typeClassMap[ing.type] || ""), ing.type);
      meta.appendChild(typeBadge);
      info.appendChild(name);
      info.appendChild(meta);

      var removeBtn = createEl("button", "ingredient-card-remove", "\u2715");
      removeBtn.setAttribute("aria-label", "Rimuovi");
      removeBtn.addEventListener("click", (function(id) {
        return function() { removeIngredient(id); };
      })(ing.id));

      card.appendChild(emoji);
      card.appendChild(info);
      card.appendChild(removeBtn);
      list.appendChild(card);
    });

    // Update summary text
    summaryText.textContent = "";
    var strong = document.createElement("strong");
    strong.textContent = selectedIngredients.length;
    summaryText.appendChild(strong);
    var suffix = selectedIngredients.length === 1 ? " ingrediente selezionato" : " ingredienti selezionati";
    summaryText.appendChild(document.createTextNode(suffix));
  }

  // ============================================
  // TAB SWITCHING & SCAN SIMULATION
  // ============================================
  function switchTab(mode) {
    var tabs = document.querySelectorAll(".scan-tab");
    var photoPanel = document.getElementById("photo-panel");
    var manualPanel = document.getElementById("manual-panel");
    var bar = document.getElementById("summaryBar");

    tabs.forEach(function(t) { t.classList.remove("active"); });

    if (mode === "photo") {
      tabs[0].classList.add("active");
      photoPanel.style.display = "";
      manualPanel.classList.remove("active");
      bar.classList.remove("visible");
    } else {
      tabs[1].classList.add("active");
      photoPanel.style.display = "none";
      manualPanel.classList.add("active");
      if (selectedIngredients.length > 0) bar.classList.add("visible");
      document.getElementById("searchInput").focus();
    }
  }

  function simulateScan() {
    var overlay = document.getElementById("scanningOverlay");
    overlay.classList.add("active");
    setTimeout(function() { window.location.href = "06-recognize.html"; }, 2000);
  }
</script>

</body>
</html>
